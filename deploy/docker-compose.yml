services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tinylink
      POSTGRES_PASSWORD: tinylink
      POSTGRES_DB: tinylink
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinylink"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/0001.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tinylink:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: postgres://tinylink:tinylink@postgres:5432/tinylink?sslmode=disable
      REDIS_URL:    redis://redis:6379/0
      LISTEN_ADDR:  ":8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
